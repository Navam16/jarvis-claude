services:
  - type: web
    name: jarvis-hr-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
